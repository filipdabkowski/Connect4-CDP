services:
  postgres:
    image: postgres:17-alpine
    container_name: connect4_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: connect4_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-migrate:
    image: connect4-backend:local
    build:
      context: ./backend_django
    restart: "no"
    environment: &backend_environment
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-before-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,reverse-proxy}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      POSTGRES_DB: ${POSTGRES_DB:-connect4}
      POSTGRES_USER: ${POSTGRES_USER:-connect4}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connect4_dev_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHANNEL_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "python", "manage.py", "migrate", "--noinput"]

  backend1:
    image: connect4-backend:local
    container_name: connect4_backend_1
    restart: unless-stopped
    environment: *backend_environment
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    command: ["uv", "run", "daphne", "-b", "0.0.0.0", "-p", "8000", "game_server.asgi:application"]

  backend2:
    image: connect4-backend:local
    container_name: connect4_backend_2
    restart: unless-stopped
    environment: *backend_environment
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    command: ["uv", "run", "daphne", "-b", "0.0.0.0", "-p", "8000", "game_server.asgi:application"]

  frontend:
    image: connect4-frontend:local
    build:
      context: ./frontend_react
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/}
    container_name: connect4_frontend
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: connect4_reverse_proxy
    restart: unless-stopped
    depends_on:
      - backend1
      - backend2
      - frontend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./reverse_proxy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
